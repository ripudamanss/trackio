<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Team</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#07091A;
    --card:#0C0F22;
    --border:rgba(255,255,255,.08);
    --text:#F0F4FF;
    --text2:#98A2B3;
    --accent:#FF4F5E;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Outfit',sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:60px 20px;
}

h1{
    text-align:center;
    margin-bottom:50px;
    font-family:'Syne',sans-serif;
    font-size:42px;
}

.team{
    max-width:1100px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:20px;
    padding:30px;
    text-align:center;
    transition:.3s;
}

.card:hover{
    transform:translateY(-8px);
    border-color:var(--accent);
}

.avatar{
    width:80px;
    height:80px;
    margin:auto 0 20px;
    margin-left:auto;
    margin-right:auto;
    border-radius:50%;
    background:var(--accent);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    font-weight:bold;
    font-family:'Syne',sans-serif;
}

.name{
    font-size:22px;
    font-weight:700;
    margin-bottom:8px;
}

.role{
    color:var(--text2);
}

.back-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:12px 24px;
    background:linear-gradient(135deg,var(--coral),var(--coralD));
    color:#fff;
    text-decoration:none;
    font-family:'Outfit',sans-serif;
    font-size:15px;
    font-weight:600;
    border-radius:999px;
    box-shadow:0 10px 24px rgba(255,79,94,.35);
    transition:all .25s ease;
}

.back-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 16px 32px rgba(255,79,94,.45);
}

.back-btn:active{
    transform:translateY(0);
}

.back-btn svg{
    width:18px;
    height:18px;
}
</style>
</head>

<body>
<a href="./index.html" class="back-btn">GO BACK</a>
<h1>Our Team</h1>

<div class="team">

    <div class="card">
        <div class="avatar">R</div>
        <div class="name">Ripudaman</div>
    </div>

    <div class="card">
        <div class="avatar">G</div>
        <div class="name">Gorav</div>
    </div>

    <div class="card">
        <div class="avatar">K</div>
        <div class="name">Kulwant</div>
    </div>

    <div class="card">
        <div class="avatar">S</div>
        <div class="name">Sunil</div>
    </div>

</div>

</body>
</html>
